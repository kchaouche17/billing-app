<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de factures – Karim Chaouche</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f2ee;color:#111;font-size:14px;padding:24px}
.container{max-width:760px;margin:0 auto}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:20px}
.card{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:18px 20px;margin-bottom:14px}
.section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:12px}
label{font-size:12px;color:#555;display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#111;font-size:13px;font-family:Arial,sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:#185FA5}
textarea{resize:vertical;min-height:52px}
.row{display:grid;gap:10px;margin-bottom:12px}
.r2{grid-template-columns:1fr 1fr}
.r3{grid-template-columns:1fr 1fr 1fr}
.btn{padding:9px 18px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#111;font-size:13px;cursor:pointer;transition:background .15s}
.btn:hover{background:#f0eeea}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:500}
.btn.primary:hover{background:#0C447C}
.btn.green{background:#1a7a4a;color:#fff;border-color:#1a7a4a;font-weight:500}
.btn.green:hover{background:#145e38}
.btn.small{padding:5px 12px;font-size:12px}
.btn.danger{background:transparent;color:#E24B4A;border-color:#E24B4A;padding:5px 10px;font-size:12px}
.btn.danger:hover{background:#FCEBEB}
.period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.period-btn{padding:8px 6px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#555;font-size:11px;cursor:pointer;text-align:center;transition:all .15s;line-height:1.4}
.period-btn:hover{border-color:#185FA5;color:#185FA5}
.period-btn.active{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:600}
.period-btn.has-data::after{content:"●";display:block;font-size:8px;color:#1a7a4a;margin-top:2px}
.period-btn.active.has-data::after{color:#b5d4f4}
.line-item{background:#f9f8f6;border:0.5px solid #e8e6e0;border-radius:8px;margin-bottom:6px;overflow:hidden}
.line-summary{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;transition:background .12s}
.line-summary:hover{background:#f0ede6}
.line-summary.open{background:#EBF3FC;border-bottom:1px solid #c8dff5}
.line-editor{padding:12px 14px;display:none}
.line-editor.open{display:block}
.line-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#E6F1FB;color:#185FA5;font-weight:500;flex-shrink:0}
.chevron{font-size:11px;color:#aaa;margin-left:auto;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.sum-desc{font-size:13px;color:#222;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.sum-desc.empty{color:#aaa;font-style:italic}
.sum-meta{font-size:12px;color:#185FA5;font-weight:600;white-space:nowrap;flex-shrink:0}
.sum-date{font-size:11px;color:#888;white-space:nowrap;flex-shrink:0}
.total-box{background:#185FA5;color:#fff;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:7px 16px;border:1px solid #ddd;border-radius:6px;font-size:13px;cursor:pointer;background:#fff;color:#555}
.tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
#preview-wrap{display:none}
.preview-invoice{background:#fff;border-radius:8px;overflow:hidden;border:1px solid #ddd;font-size:12px}
.inv-header{background:#185FA5;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
.inv-label{color:#b5d4f4;font-size:9px;font-weight:600;letter-spacing:1.5px}
.inv-title{color:#fff;font-size:22px;font-weight:700;margin-top:2px}
.inv-period-sub{color:#b5d4f4;font-size:11px;margin-top:3px}
.inv-right{text-align:right;color:#b5d4f4;font-size:11px;line-height:1.8}
.inv-right .inv-name{color:#fff;font-size:14px;font-weight:700}
.inv-meta{padding:16px 24px;display:flex;justify-content:space-between;border-bottom:1px solid #eee}
.inv-meta-block .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:4px}
.inv-meta-block .val{font-size:13px;font-weight:600;color:#111}
.inv-meta-block .sub{font-size:11px;color:#555;line-height:1.7}
table.inv-table{width:100%;border-collapse:collapse}
table.inv-table th{background:#f5f5f3;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#888;padding:8px 14px;text-align:left;border-bottom:1px solid #e8e8e8}
table.inv-table td{padding:8px 14px;font-size:11px;color:#333;border-bottom:1px solid #f2f2f2;vertical-align:top}
table.inv-table tr:nth-child(even) td{background:#fafaf8}
.inv-footer-row{padding:14px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.inv-total-chip{background:#185FA5;color:#fff;border-radius:6px;padding:10px 18px;text-align:right;white-space:nowrap}
.inv-total-chip .chip-lbl{font-size:9px;opacity:.8;letter-spacing:.5px}
.inv-total-chip .chip-amt{font-size:20px;font-weight:700}
.inv-footer-note{font-size:10px;color:#777;line-height:1.6}
.hr{border:none;border-top:1px solid #eee;margin:0}
.translating{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#185FA5}
.spinner{width:12px;height:12px;border:2px solid #b5d4f4;border-top-color:#185FA5;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:460px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
@media(max-width:500px){.r2,.r3{grid-template-columns:1fr}.period-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
  <h1>Générateur de factures</h1>
  <p class="subtitle">Karim Chaouche – Consultant</p>
  <div id="form-wrap">
    <div class="tabs">
      <div class="tab active" onclick="showTab('form')">&#x270F;&#xFE0F; Saisie</div>
      <div class="tab" onclick="showTab('preview')">&#x1F441; Aperçu</div>
    </div>
    <div class="card">
      <div class="section-title">Période de facturation</div>
      <div id="period-grid" class="period-grid"></div>
      <div class="row r3" style="margin-bottom:0">
        <div><label>Numéro de facture</label><input type="number" id="inv-num" min="1" value="1"></div>
        <div><label>Taux horaire ($)</label><input type="number" id="rate" value="100" min="1"></div>
        <div><label>Client</label>
          <select id="client" onchange="fillClient()">
            <option value="bisson">Bisson Expert</option>
            <option value="rivard">Soudures Rivard</option>
            <option value="custom">+ Autre client...</option>
          </select>
        </div>
      </div>
      <div id="custom-client" style="display:none;margin-top:12px">
        <div class="row r2">
          <div><label>Nom</label><input id="c-name" type="text" placeholder="Nom de l'entreprise"></div>
          <div><label>Téléphone</label><input id="c-phone" type="text" placeholder="(514) 000-0000"></div>
        </div>
        <div class="row r2" style="margin-bottom:0">
          <div><label>Adresse</label><input id="c-addr" type="text"></div>
          <div><label>Ville, Province, Code postal</label><input id="c-city" type="text"></div>
        </div>
      </div>
    </div>
    <div class="card" id="github-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="section-title" style="margin:0">GitHub – Sauvegarde automatique</div>
        <span id="github-status" style="font-size:11px;color:#888"></span>
      </div>
      <div class="row" style="margin-bottom:0">
        <div>
          <label>Personal Access Token <span style="color:#aaa;font-size:11px">(sauvegardé localement, jamais transmis)</span></label>
          <div style="display:flex;gap:8px">
            <input type="password" id="github-token" placeholder="ghp_..." style="flex:1" oninput="saveGithubToken()">
            <button class="btn small" onclick="toggleTokenVisibility()" style="flex-shrink:0;width:40px">&#x1F441;</button>
          </div>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="section-title" style="margin:0">Tâches</div>
      <button class="btn small" onclick="addLine()">+ Ajouter une tâche</button>
    </div>
    <div id="lines"></div>
    <div class="total-box">
      <span style="font-size:13px;opacity:.85">Total des heures&nbsp;: <strong id="total-hrs">0</strong>h</span>
      <span style="font-size:18px;font-weight:700" id="total-amt">0,00 $</span>
    </div>
    <div style="display:flex;gap:10px;justify-content:space-between;margin-top:14px;margin-bottom:2rem;flex-wrap:wrap;align-items:center">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" style="font-size:12px;padding:6px 12px;color:#555" onclick="exportData()">&#x1F4E4; Exporter</button>
        <label class="btn" style="font-size:12px;padding:6px 12px;color:#555;cursor:pointer;margin:0">&#x1F4E5; Importer<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn" onclick="showTab('preview')">&#x1F441; Aperçu</button>
        <button class="btn primary" onclick="downloadPDF()">&#x2B07; Télécharger PDF</button>
      </div>
    </div>
  </div>
  <div id="preview-wrap">
    <div class="tabs">
      <div class="tab" onclick="showTab('form')">&#x270F;&#xFE0F; Saisie</div>
      <div class="tab active" onclick="showTab('preview')">&#x1F441; Aperçu</div>
    </div>
    <div id="preview-content"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;margin-bottom:2rem;flex-wrap:wrap">
      <button class="btn" onclick="showTab('form')">&#x270F;&#xFE0F; Modifier</button>
      <button class="btn primary" onclick="downloadPDF()">&#x2B07; Télécharger PDF</button>
      <button class="btn green" onclick="openEmailModal()">&#x2709; Envoyer par email</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="email-modal">
  <div class="modal">
    <h2>Envoyer la facture</h2>
    <div class="row" style="margin-bottom:10px"><div><label>Destinataire</label><input type="email" id="email-to"></div></div>
    <div class="row" style="margin-bottom:10px"><div><label>Cc</label><input type="email" id="email-cc" value="kchaouche17@gmail.com"></div></div>
    <div class="row" style="margin-bottom:10px"><div><label>Objet</label><input type="text" id="email-subject"></div></div>
    <div class="row" style="margin-bottom:0"><div><label>Message</label><textarea id="email-body" style="min-height:90px"></textarea></div></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeEmailModal()">Annuler</button>
      <button class="btn green" onclick="sendEmail()">&#x2709; Envoyer</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const ME={name:"Karim Chaouche",email:"kchaouche17@gmail.com",title:"Consultant indépendant"};
const CLIENTS={
  bisson:{name:"Bisson Expert",addr:"5450 rue Ramsay",city:"Saint-Hubert, QC",postal:"J3Y 2S4",phone:"(514) 967-3698",email:"Payables@bissonexpert.com",contact:"France"},
  rivard:{name:"Soudures Rivard",addr:"14580, Rue Joseph-Marc Vermette",city:"Mirabel, QC",postal:"J7J 1X2",phone:"450-437-8666",email:"comptabilite@souduresrivard.com",contact:"Kim"}
};
const MONTHS_FR=["","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const STORAGE_KEY="kc_invoices_v1";
let lines=[],currentPeriodKey="";

function getPeriods(aroundDate){
  const periods=[],d=aroundDate||new Date();
  let base=new Date(d.getFullYear(),d.getMonth()-2,1);
  for(let i=0;i<8;i++){
    const y=base.getFullYear(),m=base.getMonth();
    periods.push({key:`${y}-${String(m+1).padStart(2,'0')}-P1`,year:y,month:m+1,half:1,
      label:`1–15 ${MONTHS_FR[m+1].substring(0,4)}. ${y}`,endDay:15,endDate:`${String(m+1).padStart(2,'0')}-15-${y}`});
    const lastDay=new Date(y,m+1,0).getDate();
    periods.push({key:`${y}-${String(m+1).padStart(2,'0')}-P2`,year:y,month:m+1,half:2,
      label:`16–${lastDay} ${MONTHS_FR[m+1].substring(0,4)}. ${y}`,endDay:lastDay,endDate:`${String(m+1).padStart(2,'0')}-${lastDay}-${y}`});
    base=new Date(y,m+1,1);
  }
  return periods;
}

function detectCurrentPeriod(){
  const now=new Date(),d=now.getDate(),m=now.getMonth()+1,y=now.getFullYear();
  return `${y}-${String(m).padStart(2,'0')}-P${d<=15?1:2}`;
}

const INVOICE_BASES={bisson:{year:2026,month:2,half:1},rivard:{year:2026,month:4,half:2},custom:{year:2026,month:4,half:2}};

function calcInvoiceNum(period){
  const ck=document.getElementById("client").value||"bisson";
  const base=INVOICE_BASES[ck]||INVOICE_BASES.bisson;
  const totalBase=(base.year-2026)*24+(base.month-1)*2+(base.half-1);
  const total=(period.year-2026)*24+(period.month-1)*2+(period.half-1);
  return Math.max(1,total-totalBase+1);
}

function renderPeriodGrid(){
  const periods=getPeriods(),grid=document.getElementById("period-grid");
  grid.innerHTML="";
  periods.forEach(p=>{
    const btn=document.createElement("div"),hasData=hasDataForPeriod(p.key);
    btn.className="period-btn"+(p.key===currentPeriodKey?" active":"")+(hasData?" has-data":"");
    btn.innerHTML=`<span>${p.label}</span>${hasData?`<span style="font-size:9px;color:${p.key===currentPeriodKey?'#b5d4f4':'#1a7a4a'}">● données</span>`:''}`;
    btn.onclick=()=>switchPeriod(p);
    grid.appendChild(btn);
  });
}

function switchPeriod(p){
  saveCurrentLines();currentPeriodKey=p.key;lines=loadLinesForCurrent();
  document.getElementById("inv-num").value=calcInvoiceNum(p);
  renderPeriodGrid();renderLines();updateTotal();
}

function clientKey(){return document.getElementById("client").value||"bisson";}
function storageKey(periodKey){return `${clientKey()}::${periodKey}`;}
function loadAll(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");}catch{return{};}}
function saveCurrentLines(){
  if(!currentPeriodKey)return;
  const all=loadAll();all[storageKey(currentPeriodKey)]=JSON.parse(JSON.stringify(lines));
  localStorage.setItem(STORAGE_KEY,JSON.stringify(all));
}
function loadLinesForCurrent(){
  const all=loadAll();
  return all[storageKey(currentPeriodKey)]?JSON.parse(JSON.stringify(all[storageKey(currentPeriodKey)])):[];
}
function hasDataForPeriod(periodKey){
  const all=loadAll();return !!(all[storageKey(periodKey)]&&all[storageKey(periodKey)].length>0);
}

function fillClient(){
  document.getElementById("custom-client").style.display=document.getElementById("client").value==="custom"?"block":"none";
  lines=loadLinesForCurrent();
  const p=getPeriodForKey(currentPeriodKey);if(p)document.getElementById("inv-num").value=calcInvoiceNum(p);
  renderPeriodGrid();renderLines();updateTotal();
}

function getClient(){
  const v=document.getElementById("client").value;
  if(v==="bisson"||v==="rivard")return CLIENTS[v];
  return{name:document.getElementById("c-name").value||"Client",addr:document.getElementById("c-addr").value||"",
    city:document.getElementById("c-city").value||"",postal:"",phone:document.getElementById("c-phone").value||"",email:"",contact:""};
}

function getPeriodForKey(key){return getPeriods().find(p=>p.key===key);}
function getPeriodLabel(){const p=getPeriodForKey(currentPeriodKey);return p?p.label:"";}
function getEndDate(){const p=getPeriodForKey(currentPeriodKey);return p?p.endDate:"";}

function formatDate(d){
  if(!d)return"";const[yr,mo,dy]=d.split("-");if(!yr||!mo||!dy)return d;
  return `${parseInt(dy)} ${MONTHS_FR[parseInt(mo)].substring(0,4)}.`;
}

async function translateToFrench(text){
  if(!text||!text.trim())return text;
  const englishWords=/\b(meeting|review|set up|setup|finishing|research|investigation|update|check|follow|with|and|for|the|to|of|in|at|on|by|from|into|about)\b/i;
  if(!englishWords.test(text))return text;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,
        messages:[{role:"user",content:`Traduis cette description de tâche de consultant en français québécois professionnel. Conserve les noms propres (Linda, Ramzi, Azure, Monday, Power BI, CRM, GRO, etc.) tels quels. Retourne UNIQUEMENT la traduction, sans guillemets ni explication:\n\n${text}`}]})});
    const data=await resp.json();return data?.content?.[0]?.text?.trim()||text;
  }catch{return text;}
}

let _logQueue=[],_logTimer=null;
function logActivity(action,lineData,extra){
  const client=getClient().name,period=getPeriodLabel();
  const invNum=document.getElementById("inv-num").value||"?";
  const now=new Date(),ts=now.toLocaleString("fr-CA",{dateStyle:"short",timeStyle:"short"});
  const desc=(lineData?.desc||"").replace(/"/g,"'").substring(0,80);
  const hrs=lineData?.hrs||"",date=lineData?.date||"";
  const detail=extra?String(extra).replace(/"/g,"'").substring(0,60):"";
  _logQueue.push(`"${ts}","${client}","Facture ${invNum}","${period}","${action}","${desc}","${hrs}","${date}","${detail}"`);
  clearTimeout(_logTimer);_logTimer=setTimeout(flushActivityLog,3000);
}

async function flushActivityLog(){
  if(!_logQueue.length)return;
  const token=getGithubToken();if(!token||!token.startsWith("ghp_")){_logQueue=[];return;}
  const rows=[..._logQueue];_logQueue=[];
  const folder=clientFolder(),CSV_PATH=`${folder}/logs/activity-log.csv`;
  const CSV_HEADER="Horodatage,Client,Facture,Période,Action,Description,Heures,Date tâche,Détail\n";
  try{
    const sha=await githubGetFileSha(token,CSV_PATH);
    let existing=CSV_HEADER;
    if(sha){const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${CSV_PATH}`,{headers:{"Authorization":`token ${token}`}});
      const d=await r.json();existing=atob(d.content.replace(/\n/g,""));}
    const updated=existing+rows.join("\n")+"\n";
    const b64=btoa(unescape(encodeURIComponent(updated)));
    await githubPutFile(token,CSV_PATH,b64,`Activity log: ${rows.length} event${rows.length>1?"s":""}`,sha);
  }catch(e){}
}

function addLine(desc="",hrs="",date="",startOpen=true){
  const id=Date.now()+Math.floor(Math.random()*10000);
  if(!date){
    const now=new Date(),p=getPeriodForKey(currentPeriodKey);let day=now.getDate();
    if(p){
      const maxDay=p.half===1?15:p.endDay,minDay=p.half===1?1:16;
      if(now.getMonth()+1===p.month&&now.getFullYear()===p.year){day=Math.min(Math.max(day,minDay),maxDay);}
      else{day=p.half===1?1:16;}
      date=`${p.year}-${String(p.month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
  }
  lines.push({id,desc,hrs,date});
  document.querySelectorAll(".line-editor.open").forEach(el=>{
    el.classList.remove("open");el.previousElementSibling.classList.remove("open");
    el.previousElementSibling.querySelector(".chevron")?.classList.remove("open");
    refreshSummary(el.closest(".line-item"));
  });
  appendLineDOM(id,lines.length-1,desc,hrs,date,startOpen);
  renumberTags();updateTotal();saveCurrentLines();
  if(desc||hrs)logActivity("AJOUT",{desc,hrs,date});
  if(startOpen){setTimeout(()=>{const ta=document.querySelector(`[data-lineid="${id}"] textarea`);if(ta){ta.scrollIntoView({behavior:"smooth",block:"center"});ta.focus();}},60);}
}

function toggleLine(id){
  const el=document.querySelector(`[data-lineid="${id}"]`);if(!el)return;
  const summary=el.querySelector(".line-summary"),editor=el.querySelector(".line-editor"),chev=el.querySelector(".chevron");
  const isOpen=editor.classList.contains("open");
  if(isOpen){editor.classList.remove("open");summary.classList.remove("open");chev.classList.remove("open");refreshSummary(el);}
  else{
    document.querySelectorAll(".line-editor.open").forEach(oe=>{
      oe.classList.remove("open");oe.previousElementSibling.classList.remove("open");
      oe.previousElementSibling.querySelector(".chevron")?.classList.remove("open");
      refreshSummary(oe.closest(".line-item"));
    });
    editor.classList.add("open");summary.classList.add("open");chev.classList.add("open");

function refreshSummary(itemEl){

  const rate=parseFloat(document.getElementById("rate").value)||0,hrs=parseFloat(l.hrs)||0;

  const descEl=itemEl.querySelector(".sum-desc"),metaEl=itemEl.querySelector(".sum-meta"),dateEl=itemEl.querySelector(".sum-date");

function removeLine(id){
  const deleted=lines.find(l=>l.id===id);lines=lines.filter(l=>l.id!==id);
  const el=document.querySelector(`[data-lineid="${id}"]`);if(el)el.remove();

let _updateLogTimers={};
function updateLine(id,field,val){

function generatePDFBlob(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"letter"});
  const client=getClient(),period=getPeriodLabel();
  const rate=parseFloat(document.getElementById("rate").value)||0,num=document.getElementById("inv-num").value||"X";
  const totalHrs=lines.reduce((s,l)=>s+(parseFloat(l.hrs)||0),0);

  const hrsDisplay=totalHrs%1===0?totalHrs.toFixed(0):String(totalHrs);
  const multiplierLabel=`${hrsDisplay}h  x  ${rate} $/h`;
  const today=new Date().toLocaleDateString("fr-CA",{day:"numeric",month:"long",year:"numeric"});
  const PW=612,PAD=36,TW=612-72;
  const BLUE=[24,95,165],LBLUE=[181,212,244],DARK=[17,17,17],MID=[85,85,85],MUTED=[136,136,136];
  const GRAYBG=[240,240,238],ALTROW=[250,250,248],ROWLINE=[238,238,238];
  const PAGE_H=792,MARGIN_BOTTOM=80;
  let y=PAD;
  doc.setFillColor(...BLUE);doc.rect(PAD,y,TW,72,"F");
  doc.setFont("helvetica","bold");doc.setTextColor(...LBLUE);doc.setFontSize(7);doc.text("FACTURE",PAD+14,y+16);
  doc.setTextColor(255,255,255);doc.setFontSize(22);doc.text(`No. ${num}`,PAD+14,y+38);
  doc.setFont("helvetica","normal");doc.setTextColor(...LBLUE);doc.setFontSize(9);doc.text(period,PAD+14,y+54);
  doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);doc.setFontSize(12);doc.text(ME.name,PW-PAD-14,y+22,{align:"right"});
  doc.setFont("helvetica","normal");doc.setTextColor(...LBLUE);doc.setFontSize(8);
  doc.text(ME.email,PW-PAD-14,y+35,{align:"right"});doc.text(ME.title,PW-PAD-14,y+47,{align:"right"});
  y+=82;
  doc.setFont("helvetica","bold");doc.setTextColor(...MUTED);doc.setFontSize(7);doc.text("FACTURÉ À",PAD+4,y+10);
  doc.setFont("helvetica","bold");doc.setTextColor(...DARK);doc.setFontSize(11);doc.text(client.name,PAD+4,y+23);
  doc.setFont("helvetica","normal");doc.setTextColor(...MID);doc.setFontSize(8);
  doc.text(client.addr,PAD+4,y+34);doc.text(`${client.city} ${client.postal}`,PAD+4,y+44);doc.text(client.phone,PAD+4,y+54);
  doc.setFont("helvetica","bold");doc.setTextColor(...MUTED);doc.setFontSize(7);doc.text("PÉRIODE",PW-PAD-4,y+10,{align:"right"});
  doc.setFont("helvetica","bold");doc.setTextColor(...DARK);doc.setFontSize(11);doc.text(period,PW-PAD-4,y+23,{align:"right"});
  doc.setFont("helvetica","normal");doc.setTextColor(...MID);doc.setFontSize(8);doc.text(`Émise le : ${today}`,PW-PAD-4,y+44,{align:"right"});
  y+=64;doc.setDrawColor(221,221,221);doc.setLineWidth(0.5);doc.line(PAD,y,PW-PAD,y);y+=10;
  const CW=[TW*0.72,TW*0.16,TW*0.12],cx=[PAD,PAD+CW[0],PAD+CW[0]+CW[1]];
  function drawTableHeader(){
    doc.setFillColor(...GRAYBG);doc.rect(PAD,y,TW,20,"F");
    doc.setFont("helvetica","bold");doc.setTextColor(...MUTED);doc.setFontSize(7);
    doc.text("DESCRIPTION",cx[0]+5,y+13);
    doc.text("DATE",cx[1]+CW[1]/2,y+13,{align:"center"});
    doc.text("HEURES",cx[2]+CW[2]/2,y+13,{align:"center"});
    y+=20;
  }
  drawTableHeader();
  lines.forEach((l,i)=>{
    const hrs=parseFloat(l.hrs)||0,hrsStr=String(hrs);
    const maxW=CW[0]-12;
    doc.setFont("helvetica","normal");doc.setFontSize(8);
    const descLines=doc.splitTextToSize(l.desc||"(sans description)",maxW);
    const rowH=Math.max(18,descLines.length*11+8);
    if(y+rowH+MARGIN_BOTTOM>PAGE_H){doc.addPage();y=PAD;drawTableHeader();}
    if(i%2===1){doc.setFillColor(...ALTROW);}else{doc.setFillColor(255,255,255);}
    doc.rect(PAD,y,TW,rowH,"F");
    doc.setDrawColor(...ROWLINE);doc.setLineWidth(0.3);doc.line(PAD,y+rowH,PW-PAD,y+rowH);
    doc.setTextColor(...DARK);doc.text(descLines,cx[0]+5,y+12);
    doc.setTextColor(...MID);doc.text(formatDate(l.date),cx[1]+CW[1]/2,y+rowH/2+3,{align:"center"});
    doc.setTextColor(...DARK);doc.text(hrsStr,cx[2]+CW[2]/2,y+rowH/2+3,{align:"center"});
    y+=rowH;
  });
  y+=12;
  const totalColW=TW*0.33;
  doc.setFont("helvetica","normal");doc.setTextColor(...MID);doc.setFontSize(10);doc.text(multiplierLabel,PAD+6,y+16);
  doc.setFillColor(...BLUE);doc.rect(PW-PAD-totalColW,y,totalColW,32,"F");
  doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);doc.setFontSize(14);doc.text(totalAmt,PW-PAD-10,y+21,{align:"right"});
  y+=44;y+=12;

  const footerLines=doc.splitTextToSize(`Payable à la réception par virement Interac au ${ME.email}. C'est un plaisir de faire affaire avec ${client.name}. Merci!`,TW);
  doc.text(footerLines,PAD,y);
  return doc.output("blob");
}

async function githubGetFileSha(token,path){
  const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,{headers:{"Authorization":`token ${token}`,"Accept":"application/vnd.github.v3+json"}});
  if(r.status===404)return null;const d=await r.json();return d.sha||null;
}
async function githubPutFile(token,path,contentB64,message,sha){
  const body={message,content:contentB64};if(sha)body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,{method:"PUT",headers:{"Authorization":`token ${token}`,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"},body:JSON.stringify(body)});
  return r.ok;
}
async function pushToGitHub(pdfBlob,filename,invoiceData){
  const token=getGithubToken();if(!token||!token.startsWith("ghp_")){setGithubStatus("Manque token","#e8a800");return;}
  const folder=clientFolder(),pdfPath=`${folder}/invoices/${filename}`,csvPath=`${folder}/logs/invoices-log.csv`;
  const csvHeader="No,Client,Période,Date émission,Heures,Taux,Total,Fichier\n";
  setGithubStatus("Envoi GitHub...","#185FA5");
  try{
    const pdfB64=await new Promise((res,rej)=>{const reader=new FileReader();reader.onload=()=>res(reader.result.split(",")[1]);reader.onerror=rej;reader.readAsDataURL(pdfBlob);});
    const pdfSha=await githubGetFileSha(token,pdfPath);
    const pdfOk=await githubPutFile(token,pdfPath,pdfB64,`Add invoice: ${filename}`,pdfSha);
    const csvSha=await githubGetFileSha(token,csvPath);
    let csvContent=csvHeader;
    if(csvSha){const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${csvPath}`,{headers:{"Authorization":`token ${token}`}});const d=await r.json();csvContent=atob(d.content.replace(/\n/g,""));}
    const newRow=`${invoiceData.num},"${invoiceData.client}","${invoiceData.period}","${invoiceData.issued}",${invoiceData.hours},${invoiceData.rate},"${invoiceData.total}","${filename}"`;
    if(!csvContent.includes(`"${filename}"`))csvContent+=newRow+"\n";
    const csvB64=btoa(unescape(encodeURIComponent(csvContent)));
    const csvOk=await githubPutFile(token,csvPath,csvB64,`Update invoices log: ${filename}`,csvSha);
    if(pdfOk&&csvOk)setGithubStatus("Sauvegardé GitHub","#1a7a4a");else setGithubStatus("Erreur partielle","#e8a800");
  }catch(e){setGithubStatus("Erreur: "+e.message,"#E24B4A");}
}

function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const bundle=JSON.parse(e.target.result),incoming=bundle.data||bundle,current=loadAll();
      const merged={...incoming,...current};
      Object.keys(incoming).forEach(k=>{if(!current[k]||current[k].length===0)merged[k]=incoming[k];});
      localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
      if(bundle.flags)Object.keys(bundle.flags).forEach(k=>localStorage.setItem(k,bundle.flags[k]));
      lines=loadLinesForCurrent();renderPeriodGrid();renderLines();updateTotal();
      showToast(`${Object.keys(incoming).length} périodes importées!`);
    }catch{showToast('Fichier invalide.');}
  };
  reader.readAsText(file);event.target.value='';
}
